<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- header section with logo on the left and navigation on the right -->
    <div class="header">
        <div class="logo">
            <img src="image/rebel.png" alt="Logo" class="logo-img">
        </div>
        <div class="nav">
            <a href="index.html" class="nav-item">Home</a>
            <a href="leaderboard.html" class="nav-item">Leaderboard</a>
            <a href="help.html" class="nav-item">Help</a>
            <!-- dropdown for login -->
            <div class="dropdown">
                <button class="dropbtn nav-item">Account</button>
                <div class="dropdown-content" id="loginDropdown">
                    <a href="login.html" id="loginLink">Login</a>
                    <a href="signin.html" id="signUpLink">Sign Up</a>
                    <span id="loggedInUser" style="display: none;">User: <span id="username"></span></span>
                    <a href="#" id="logoutLink" style="display: none;" onclick="logout()">Log Out</a>
                </div>
            </div>
        </div>
    </div>

    <!-- yellow border line under the header -->
    <div class="yellow-border"></div>

    <!-- display background image -->
    <div class="content-with-background">
        <!-- login form display  with inputs-->
        <div class="logform">
            <h5>LOGIN</h5>
            <form onsubmit="login(event)">
                <div>
                    <label for="loginuser">Username:</label>
                    <input type="text" id="loginuser" placeholder="Username" required>
                </div>
                <div>
                    <label for="loginPassword">password:</label>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <div>
                    <button type="submit">Log In</button>
                </div>
                <div>
                    <button type="button" onclick="window.location.href = 'signin.html'">Sign Up</button>
                </div>
            </form>
        </div>
    </div>


    <div class="yellow-border-bottom"></div>
    <!-- displays the message at the bottom right-->
    <div class="helpat">
        <P>help@rebelfighters.com</P>
    </div>
    <script src="javascripit/sign.js"></script>


</body>

</html>
